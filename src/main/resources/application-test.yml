# 测试环境配置（预留，部署时替换为测试库地址）
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://test-mysql:3306/test_platform?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
    username: test_user
    password: test_pass

server:
  port: 8081
  servlet:
    context-path: /auto-test

logging:
  level:
    com.auto.test.platform: warn

# Knife4j测试环境配置
knife4j:
  enable: true
  openapi:
    title: 企业级自动化测试平台接口文档（测试环境）
    description: 测试环境接口详情，供测试人员使用
    version: 1.0.0
    servers:
      - url: http://xxx.xxx.xxx.xxx:8081/auto-test
        description: 测试环境接口地址